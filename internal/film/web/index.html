<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>影库 · Film Knowledge Base</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#272c37;
    --txt:#e6e9ef; --mut:#9aa3b2; --accent:#e0556f; --accent2:#c43e58;
    --ok:#3fb950; --warn:#d29922; --err:#f85149; --gold:#d8a657; --radius:10px;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft Yahei",sans-serif;background:var(--bg);color:var(--txt)}
  header{display:flex;align-items:center;gap:12px;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  header h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.3px}
  header .grow{flex:1}
  select,input,button,textarea{font:inherit;color:var(--txt);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 10px;outline:none}
  select:focus,input:focus,textarea:focus{border-color:var(--accent)}
  button{cursor:pointer;background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
  button:hover{background:var(--accent2)}
  button.ghost{background:transparent;border-color:var(--line);color:var(--mut)}
  button.ghost:hover{color:var(--txt);border-color:var(--mut)}
  button.danger{background:transparent;border-color:#5a2a2a;color:#ff8d85}
  button.danger:hover{background:#2a1414}
  button.sm{padding:4px 9px;font-size:12px;border-radius:7px}
  .wrap{display:flex;min-height:calc(100vh - 53px)}
  .sidebar{width:340px;border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column}
  .searchbar{padding:12px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  .searchbar .row{display:flex;gap:6px}
  .searchbar input{flex:1}
  .modes{display:flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .modes button{flex:1;background:var(--panel2);border:none;border-radius:0;color:var(--mut);font-size:12px;padding:6px}
  .modes button.on{background:var(--accent);color:#fff}
  .list{flex:1;overflow-y:auto;padding:8px}
  .mvcard{padding:10px 12px;border-radius:9px;cursor:pointer;border:1px solid transparent;margin-bottom:4px}
  .mvcard:hover{background:var(--panel2)}
  .mvcard.sel{background:var(--panel2);border-color:var(--accent)}
  .mvcard .t{font-weight:600}
  .mvcard .m{color:var(--mut);font-size:12px;margin-top:2px}
  .hit{padding:9px 12px;border-radius:9px;cursor:pointer;margin-bottom:4px;border:1px solid var(--line);background:var(--panel2)}
  .hit:hover{border-color:var(--accent)}
  .hit .txt{font-size:13px}
  .hit .meta{color:var(--mut);font-size:11px;margin-top:3px;display:flex;gap:8px;align-items:center}
  main{flex:1;padding:22px 26px;max-width:900px;overflow-y:auto}
  h2{font-size:20px;margin:0 0 2px}
  .sub{color:var(--mut);margin:0 0 18px;font-size:13px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
  .card .hd{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);font-weight:600;font-size:13px}
  .card .hd .grow{flex:1}
  .card .bd{padding:14px}
  .chip{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--panel2);border:1px solid var(--line);color:var(--mut);margin:0 4px 4px 0}
  .chip.ai{color:var(--accent);border-color:#5a2a35}
  .chip.gold{color:var(--gold);border-color:#4a3c1c}
  .chip.ok{color:var(--ok);border-color:#1f4527}
  .chip.run{color:var(--warn);border-color:#4a3c10}
  .chip.fail{color:var(--err);border-color:#5a2a2a}
  .cast{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
  .cast:last-child{border:none}
  .beat{display:flex;gap:12px;padding:7px 0;border-bottom:1px solid var(--line)}
  .beat:last-child{border:none}
  .beat .ts{color:var(--accent);font-family:ui-monospace,Menlo,monospace;font-size:12px;min-width:62px}
  .beat .ev{color:var(--gold);font-weight:600;margin-right:6px}
  .shots{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .shots img{width:100%;border-radius:8px;border:1px solid var(--line);aspect-ratio:16/9;object-fit:cover;background:var(--panel2)}
  .seg{padding:6px 0;border-bottom:1px solid var(--line);font-size:13px;display:flex;gap:10px}
  .seg:last-child{border:none}
  .seg .ts{color:var(--mut);font-family:ui-monospace,Menlo,monospace;font-size:11px;min-width:90px}
  label.f{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--mut)}
  .empty{color:var(--mut);padding:40px;text-align:center}
  .muted{color:var(--mut)} .grow{flex:1}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  #toast{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:50}
  .toast{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:10px 14px;max-width:380px;box-shadow:0 6px 24px rgba(0,0,0,.4)}
  .toast.err{border-left-color:var(--err)} .toast.ok{border-left-color:var(--ok)}
  .banner{background:#2a2410;border:1px solid #564a16;color:#f0d98c;padding:12px 14px;border-radius:var(--radius);margin-bottom:16px;display:flex;gap:12px;align-items:center}
  .banner .grow{flex:1}
  dialog{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:var(--radius);padding:0;max-width:460px;width:92%}
  dialog::backdrop{background:rgba(0,0,0,.55)}
  dialog .hd{padding:13px 16px;border-bottom:1px solid var(--line);font-weight:600}
  dialog .bd{padding:16px;display:flex;flex-direction:column;gap:12px}
  dialog .ft{padding:12px 16px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
  .hidden{display:none!important}
  .score{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ok)}
  .shots img{cursor:zoom-in;transition:transform .08s,border-color .08s}
  .shots img:hover{transform:scale(1.04);border-color:var(--accent)}
  .seg .ts.jump{cursor:pointer;text-decoration:underline dotted}
  /* frame lightbox */
  .lb{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.93);display:flex;align-items:center;justify-content:center}
  .lb-img{max-width:92vw;max-height:80vh;object-fit:contain;border-radius:6px;background:#000}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:38px;line-height:1;background:rgba(0,0,0,.45);border:1px solid var(--line);color:#fff;width:54px;height:74px;border-radius:10px;font-weight:400}
  .lb-nav:hover{background:rgba(0,0,0,.7)} .lb-nav:disabled{opacity:.22;cursor:default}
  .lb-prev{left:18px} .lb-next{right:18px}
  .lb-x{position:absolute;top:16px;right:18px;background:rgba(0,0,0,.45);border:1px solid var(--line);color:#fff;width:40px;height:40px;border-radius:8px;font-size:16px}
  .lb-bar{position:absolute;left:0;right:0;bottom:0;padding:16px 20px 20px;background:linear-gradient(transparent,rgba(0,0,0,.8));display:flex;flex-direction:column;gap:6px;align-items:center;text-align:center}
  .lb-meta{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--mut)}
  .lb-cap{font-size:15px;color:var(--txt);max-width:920px;line-height:1.45}
  .lb-cap b{color:var(--accent);margin-right:6px}
  /* face curation (人物) */
  .facewall{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
  .facecard{cursor:pointer;border:1px solid var(--line);border-radius:9px;padding:6px;text-align:center;background:var(--panel2);transition:border-color .08s}
  .facecard:hover{border-color:var(--mut)} .facecard.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .facecard .facethumb canvas{width:84px;height:84px;border-radius:7px;display:block;margin:0 auto;background:var(--panel)}
  .facecard .facethumb{width:84px;height:84px;border-radius:7px;margin:0 auto;background:var(--panel)}
  .facecard .facename{font-size:12px;font-weight:600;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .facecard .facemeta{font-size:11px;color:var(--mut)}
  #faceDlg{max-width:680px;width:94%}
  .facegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;max-height:54vh;overflow-y:auto}
  .facecell{cursor:pointer;border:2px solid transparent;border-radius:7px;overflow:hidden;line-height:0}
  .facecell.sel{border-color:var(--accent)} .facecell canvas{width:100%;aspect-ratio:1;display:block;background:var(--panel)}
</style>
</head>
<body>
<header>
  <h1>🎬 影库</h1>
  <span class="chip" id="verTag">—</span>
  <span class="grow"></span>
  <button class="ghost sm" id="reindexBtn" title="为缺向量的数据补建索引">重建索引</button>
  <label class="f" style="flex-direction:row;align-items:center;gap:6px">
    <span>工作区</span><select id="wsSel" style="min-width:160px"></select>
  </label>
  <span class="muted" id="userBox">…</span>
</header>

<div class="wrap">
  <div class="sidebar">
    <div class="searchbar">
      <div class="modes">
        <button data-mode="keyword" class="on">关键词搜台词</button>
        <button data-mode="semantic">语义搜索</button>
      </div>
      <div class="row">
        <input id="q" placeholder="搜台词 / 语义检索…" />
        <button class="sm" id="searchBtn">搜</button>
      </div>
      <div class="row">
        <button class="sm grow" id="newBtn">+ 新建影片</button>
        <button class="ghost sm" id="clearBtn">浏览全部</button>
      </div>
    </div>
    <div class="list" id="list"><div class="empty">加载中…</div></div>
  </div>
  <main id="main"><div class="empty">选择左侧影片,或先搜索。</div></main>
</div>

<div id="toast"></div>

<div id="lightbox" class="lb hidden">
  <button class="lb-x" id="lbClose" title="关闭 (Esc)">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev" title="上一张 (←)">‹</button>
  <img class="lb-img" id="lbImg" alt="frame" />
  <button class="lb-nav lb-next" id="lbNext" title="下一张 (→)">›</button>
  <div class="lb-bar">
    <span class="lb-meta"><span id="lbCount"></span> · <span id="lbTime"></span></span>
    <span class="lb-cap" id="lbCap"></span>
  </div>
</div>

<dialog id="faceDlg">
  <div class="hd"><span id="faceDlgTitle">人物</span> <span class="grow"></span><span class="muted" style="font-weight:400">选中 <span id="faceSelN">0</span></span></div>
  <div class="bd"><div class="facegrid" id="faceDlgGrid"></div>
    <div class="muted" style="font-size:12px">点选错误的脸,然后「移除」或「拆分」;「命名」把整组归到一个人物。</div>
  </div>
  <div class="ft">
    <button class="ghost" id="faceAssign">命名…</button>
    <button class="ghost" id="faceSplit">拆分选中</button>
    <button class="danger" id="faceRemove">移除选中</button>
    <button id="faceDlgClose">关闭</button>
  </div>
</dialog>

<dialog id="newDlg"><form method="dialog">
  <div class="hd">新建影片</div>
  <div class="bd">
    <label class="f">片名 *<input id="nTitle" required></label>
    <div class="row">
      <label class="f" style="width:110px">年份<input id="nYear" type="number" placeholder="1993"></label>
      <label class="f grow">类型<select id="nKind"><option value="movie">电影</option><option value="episode">剧集</option><option value="doc">纪录片</option></select></label>
    </div>
    <label class="f">简介(可留空,可用 AI 生成)<textarea id="nSummary" rows="3"></textarea></label>
  </div>
  <div class="ft"><button type="button" class="ghost" id="nCancel">取消</button><button id="nSave">创建</button></div>
</form></dialog>

<dialog id="analyzeDlg"><form method="dialog">
  <div class="hd">AI 分析(基于台词)</div>
  <div class="bd">
    <label class="f">LLM 配置<select id="aCfg"></select></label>
    <div class="row" style="gap:14px">
      <label class="row" style="gap:5px"><input type="checkbox" class="aStep" value="summary" checked style="width:auto">剧情简介</label>
      <label class="row" style="gap:5px"><input type="checkbox" class="aStep" value="tags" checked style="width:auto">标签</label>
      <label class="row" style="gap:5px"><input type="checkbox" class="aStep" value="timeline" checked style="width:auto">时间轴</label>
    </div>
    <div class="muted" style="font-size:12px">分析在后台运行,完成后自动刷新。需要先上传字幕。</div>
  </div>
  <div class="ft"><button type="button" class="ghost" id="aCancel">取消</button><button id="aRun">开始分析</button></div>
</form></dialog>

<script>
const $ = s => document.querySelector(s);
const esc = s => (s??"").toString().replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const TOKEN_KEY="polar_film_token", WS_KEY="polar_film_ws", CFG_KEY="polar_film_llm_cfg";
let state={me:null,teams:[],ws:null,movies:[],sel:null,mode:"keyword",llmConfigs:[]};

// ── frame / lightbox state ───────────────────────────────────────────────────
let currentShots=[];               // current movie's screenshots (time-ordered)
let currentSubs=[];                // current movie's subtitle list
const shotUrlCache=new Map();      // scId → signed url (reused by grid + lightbox)
let thumbIO=null;                  // IntersectionObserver: lazy-resolve thumb urls
let lbIndex=-1;                    // active frame index in the lightbox
let lbSegments=null, lbSegPromise=null;  // primary subtitle segments, lazy (for caption)
// ── face curation (PF-12) ──
let currentMovieID=null, faceClusters=[], panelCid=null;
const selClusters=new Set(), selFaces=new Set(), imgCache=new Map();

function toast(msg,kind=""){const t=document.createElement("div");t.className="toast "+kind;t.textContent=msg;$("#toast").append(t);setTimeout(()=>t.remove(),4200);}
function ms2t(ms){if(ms==null)return"—";const s=Math.floor(ms/1000);return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}
// ms2hms — HH:MM:SS (drops HH when 0); ms2t is mm:ss only and wrong past 60min.
function ms2hms(ms){if(ms==null)return"—";let s=Math.floor(ms/1000);const h=Math.floor(s/3600);s-=h*3600;const m=Math.floor(s/60),ss=s%60;const p=n=>String(n).padStart(2,"0");return (h>0?h+":":"")+p(m)+":"+p(ss);}

// resolveShotUrl — cached signed URL for a screenshot (short-lived; re-fetch on use after error).
async function resolveShotUrl(scId){
  if(shotUrlCache.has(scId))return shotUrlCache.get(scId);
  const r=await api(`/api/film/screenshots/${scId}/url`);
  shotUrlCache.set(scId,r.url);return r.url;
}
// ensureSegments — load the primary subtitle's segments once, sorted, for the lightbox caption.
async function ensureSegments(){
  if(lbSegments)return lbSegments;
  if(lbSegPromise)return lbSegPromise;
  const sub=currentSubs&&currentSubs[0];
  if(!sub){lbSegments=[];return lbSegments;}
  lbSegPromise=(async()=>{
    try{const r=await api(`/api/film/subtitles/${sub.id}/segments`);lbSegments=(r.segments||[]).slice().sort((a,b)=>a.start_ms-b.start_ms);}
    catch{lbSegments=[];}
    return lbSegments;
  })();
  return lbSegPromise;
}
// nearestShotIndex — frame whose ts_ms is closest to a given time (for台词 → frame jumps).
function nearestShotIndex(ts){
  let best=-1,bd=Infinity;
  currentShots.forEach((s,i)=>{if(s.ts_ms==null)return;const d=Math.abs(s.ts_ms-ts);if(d<bd){bd=d;best=i;}});
  return best;
}

async function openLightbox(idx){
  if(idx<0||idx>=currentShots.length)return;
  lbIndex=idx;$("#lightbox").classList.remove("hidden");await lbRender();
}
function closeLightbox(){$("#lightbox").classList.add("hidden");$("#lbImg").removeAttribute("src");}
function lbNav(d){const n=lbIndex+d;if(n<0||n>=currentShots.length)return;lbIndex=n;lbRender();}
async function lbRender(){
  const s=currentShots[lbIndex];if(!s)return;
  $("#lbCount").textContent=`${lbIndex+1} / ${currentShots.length}`;
  $("#lbTime").textContent=ms2hms(s.ts_ms);
  $("#lbPrev").disabled=lbIndex<=0;$("#lbNext").disabled=lbIndex>=currentShots.length-1;
  try{$("#lbImg").src=await resolveShotUrl(s.id);}catch{shotUrlCache.delete(s.id);}
  lbCaption(s.ts_ms);
  [lbIndex-1,lbIndex+1].forEach(i=>{const sc=currentShots[i];if(sc)resolveShotUrl(sc.id).then(u=>{const im=new Image();im.src=u;}).catch(()=>{});});
}
// lbCaption — the台词 spoken at this frame's timestamp (exact, else nearest within 5s).
async function lbCaption(ts){
  const cap=$("#lbCap");cap.innerHTML="";
  if(ts==null)return;
  const segs=await ensureSegments();if(!segs.length)return;
  let hit=segs.find(s=>ts>=s.start_ms&&ts<=s.end_ms);
  if(!hit){let bd=Infinity;for(const s of segs){const d=Math.min(Math.abs(ts-s.start_ms),Math.abs(ts-s.end_ms));if(d<bd){bd=d;hit=s;}}if(bd>5000)hit=null;}
  if(hit)cap.innerHTML=(hit.speaker?`<b>${esc(hit.speaker)}</b>`:"")+esc(hit.text);
}

async function api(path,opts={}){
  const h=Object.assign({},opts.headers||{});
  const tok=localStorage.getItem(TOKEN_KEY);
  if(tok) h["Authorization"]="Bearer "+tok;
  if(state.ws) h["X-Workspace-Id"]=state.ws;
  if(opts.body){h["Content-Type"]="application/json";opts.body=JSON.stringify(opts.body);}
  const res=await fetch(path,{...opts,headers:h,credentials:"include"});
  if(res.status===401){promptToken();throw new Error("未登录 / 会话失效");}
  const txt=await res.text();
  let data=null;try{data=txt?JSON.parse(txt):null}catch{data=txt}
  if(!res.ok){const e=new Error((data&&data.error)||txt||("HTTP "+res.status));e.status=res.status;throw e;}
  return data;
}
function promptToken(){
  const cur=localStorage.getItem(TOKEN_KEY)||"";
  const t=prompt("需要登录。粘贴 dock 的 access_token(或先到 dock 登录使 cookie 生效):",cur);
  if(t!==null){localStorage.setItem(TOKEN_KEY,t.trim());location.reload();}
}

// accessBanner — shown when the current workspace isn't granted access to the
// film plugin (403). Admins get a one-click "authorize this workspace" button
// so they know how to start; others are told to ask an admin.
function accessBanner(){
  const isAdmin=state.me&&(state.me.role==="admin"||state.me.site_admin);
  const wrap=document.createElement("div");wrap.className="banner";
  const msg=document.createElement("div");msg.className="grow";
  msg.textContent=`当前工作区未被授权访问「影库」插件(workspace ${state.ws||"—"})。`;
  wrap.append(msg);
  if(isAdmin){
    const b=document.createElement("button");b.className="sm";b.textContent="授权此工作区";
    b.onclick=async()=>{
      try{await api("/api/admin/workspace-plugin-access",{method:"PUT",body:{workspace_id:state.ws,plugin:"film",enabled:true}});
        toast("已授权,加载中…","ok");
        $("#main").innerHTML='<div class="empty">选择左侧影片,或先搜索。</div>';
        setTimeout(loadMovies,500);}
      catch(e){toast("授权失败:"+e.message,"err");}
    };
    wrap.append(b);
  }else{
    const note=document.createElement("span");note.className="muted";note.textContent="请联系管理员授权。";wrap.append(note);
  }
  return wrap;
}
// show403 surfaces the access banner in the main pane (and clears the list).
function show403(){
  const list=$("#list");if(list)list.innerHTML='<div class="empty">无访问权限</div>';
  const main=$("#main");main.innerHTML="";main.append(accessBanner());
}

async function boot(){
  try{state.me=await api("/api/me");}catch(e){return;}
  $("#userBox").innerHTML=`👤 ${esc(state.me.username||"")}`;
  try{const t=await api("/api/teams");state.teams=t.teams||t||[];}catch{state.teams=[];}
  state.ws=localStorage.getItem(WS_KEY)||(state.teams[0]&&state.teams[0].id)||"";
  const sel=$("#wsSel");sel.innerHTML="";
  state.teams.forEach(t=>{const o=document.createElement("option");o.value=t.id;o.textContent=t.name||t.slug||t.id;sel.append(o);});
  if(state.ws)sel.value=state.ws;
  sel.onchange=()=>{state.ws=sel.value;localStorage.setItem(WS_KEY,state.ws);state.sel=null;loadMovies();$("#main").innerHTML='<div class="empty">选择左侧影片。</div>';};
  try{const hh=await fetch("/healthz").then(r=>r.json());$("#verTag").textContent=hh.plugin+" "+hh.version;}catch{$("#verTag").textContent="film";}
  document.querySelectorAll(".modes button").forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;document.querySelectorAll(".modes button").forEach(x=>x.classList.toggle("on",x===b));$("#q").placeholder=state.mode==="semantic"?"语义检索:描述你想找的情节/台词…":"关键词搜台词…";});
  $("#searchBtn").onclick=doSearch; $("#q").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});
  $("#clearBtn").onclick=()=>{$("#q").value="";loadMovies();};
  $("#newBtn").onclick=()=>$("#newDlg").showModal();
  $("#nCancel").onclick=()=>$("#newDlg").close();
  $("#nSave").onclick=createMovie;
  $("#reindexBtn").onclick=reindex;
  $("#aCancel").onclick=()=>$("#analyzeDlg").close();
  // lightbox controls (DOM is static; bind once)
  $("#lbClose").onclick=closeLightbox;
  $("#lbPrev").onclick=()=>lbNav(-1);
  $("#lbNext").onclick=()=>lbNav(1);
  $("#lightbox").addEventListener("click",e=>{if(e.target.id==="lightbox")closeLightbox();});
  document.addEventListener("keydown",e=>{if($("#lightbox").classList.contains("hidden"))return;
    if(e.key==="Escape")closeLightbox();else if(e.key==="ArrowLeft")lbNav(-1);else if(e.key==="ArrowRight")lbNav(1);});
  let lbTouchX=null;
  // face curation dialog (static; bind once)
  $("#faceDlgClose").onclick=()=>$("#faceDlg").close();
  $("#faceAssign").onclick=()=>{const n=prompt("人物名字:");if(n&&n.trim())faceOp(`/api/film/movies/${currentMovieID}/face-clusters/${panelCid}/assign`,{name:n.trim()},"已命名");};
  $("#faceRemove").onclick=()=>{if(selFaces.size)faceOp(`/api/film/movies/${currentMovieID}/face-clusters/${panelCid}/faces/remove`,{face_ids:[...selFaces]},"已移除");};
  $("#faceSplit").onclick=()=>{if(selFaces.size)faceOp(`/api/film/movies/${currentMovieID}/face-clusters/${panelCid}/split`,{face_ids:[...selFaces]},"已拆分");};
  $("#lightbox").addEventListener("touchstart",e=>{lbTouchX=e.changedTouches[0].clientX;},{passive:true});
  $("#lightbox").addEventListener("touchend",e=>{if(lbTouchX==null)return;const dx=e.changedTouches[0].clientX-lbTouchX;lbTouchX=null;if(Math.abs(dx)>40)lbNav(dx<0?1:-1);},{passive:true});
  loadLLMConfigs(); loadMovies();
}

async function loadLLMConfigs(){
  try{const r=await api("/api/llm-configs/available");state.llmConfigs=r.configs||r||[];}catch{state.llmConfigs=[];}
}

async function loadMovies(){
  const list=$("#list");list.innerHTML='<div class="empty">加载中…</div>';
  try{
    const r=await api("/api/film/movies");
    state.movies=r.movies||[];
    if(!state.movies.length){list.innerHTML='<div class="empty">还没有影片,点「+ 新建影片」。</div>';return;}
    list.innerHTML="";
    state.movies.forEach(m=>{
      const d=document.createElement("div");d.className="mvcard"+(state.sel&&state.sel.id===m.id?" sel":"");
      d.innerHTML=`<div class="t">${esc(m.title)}</div><div class="m">${m.year||"—"} · ${esc(m.kind||"movie")}</div>`;
      d.onclick=()=>openMovie(m.id);list.append(d);
    });
  }catch(e){
    if(e.status===403){show403();return;}
    list.innerHTML=`<div class="empty">加载失败:${esc(e.message)}</div>`;
  }
}

async function doSearch(){
  const q=$("#q").value.trim();if(!q){loadMovies();return;}
  const list=$("#list");list.innerHTML='<div class="empty">搜索中…</div>';
  try{
    const r=await api(`/api/film/search?mode=${state.mode}&q=${encodeURIComponent(q)}`);
    const hits=r.hits||[];
    if(!hits.length){list.innerHTML='<div class="empty">无结果。</div>';return;}
    list.innerHTML="";
    hits.forEach(h=>{
      const d=document.createElement("div");d.className="hit";
      const score=h.score!=null?`<span class="score">${(h.score*100).toFixed(0)}%</span>`:"";
      d.innerHTML=`<div class="txt">${esc(h.text)}</div><div class="meta"><b>${esc(h.title)}</b><span>${ms2t(h.start_ms)}</span>${score}</div>`;
      d.onclick=()=>openMovie(h.media_id);list.append(d);
    });
  }catch(e){
    if(e.status===403){show403();return;}
    list.innerHTML=`<div class="empty">搜索失败:${esc(e.message)}</div>`;
  }
}

async function createMovie(){
  const title=$("#nTitle").value.trim();if(!title){toast("请填片名","err");return;}
  try{
    const body={title,kind:$("#nKind").value,summary:$("#nSummary").value.trim()};
    const y=parseInt($("#nYear").value);if(!isNaN(y))body.year=y;
    const r=await api("/api/film/movies",{method:"POST",body});
    $("#newDlg").close();$("#nTitle").value="";$("#nYear").value="";$("#nSummary").value="";
    toast("已创建","ok");await loadMovies();openMovie((r.movie&&r.movie.id)||r.id);
  }catch(e){toast(e.message,"err");}
}

async function reindex(){
  try{const r=await api("/api/film/reindex",{method:"POST"});toast(`已索引:${r.segments_embedded} 段 / ${r.movies_embedded} 片 (${r.embedder})`,"ok");}
  catch(e){toast(e.message,"err");}
}

async function openMovie(id){
  document.querySelectorAll(".mvcard").forEach(c=>c.classList.remove("sel"));
  const main=$("#main");main.innerHTML='<div class="empty">加载中…</div>';
  try{
    const det=await api(`/api/film/movies/${id}`);
    const m=det.movie||det;state.sel=m;
    const cast=det.people||det.cast||[];const tags=det.tags||[];
    const [subs,tl,shots]=await Promise.all([
      api(`/api/film/movies/${id}/subtitles`).catch(()=>({subtitles:[]})),
      api(`/api/film/movies/${id}/timeline`).catch(()=>({timeline:[]})),
      api(`/api/film/movies/${id}/screenshots`).catch(()=>({screenshots:[]})),
    ]);
    renderMovie(m,cast,tags,subs.subtitles||[],tl.timeline||[],shots.screenshots||[]);
    document.querySelectorAll(".mvcard").forEach(c=>{});
  }catch(e){main.innerHTML=`<div class="empty">加载失败:${esc(e.message)}</div>`;}
}

function renderMovie(m,cast,tags,subs,timeline,shots){
  const main=$("#main");
  const tagChips=tags.map(t=>`<span class="chip ${t.source==='ai'||t.kind==='ai'?'ai':'gold'}">${esc(t.name)}</span>`).join("")||'<span class="muted">暂无</span>';
  const castRows=cast.length?cast.map(c=>`<div class="cast"><span>${esc(c.name)}</span><span class="muted">${esc(c.role||"")}${c.character?" · "+esc(c.character):""}</span></div>`).join(""):'<span class="muted">暂无</span>';
  const tlRows=timeline.length?timeline.map(b=>`<div class="beat"><span class="ts">${ms2t(b.start_ms)}</span><span><span class="ev">${esc(b.event_type)}</span>${esc(b.description)}</span></div>`).join(""):'<span class="muted">暂无,点「AI 分析」生成</span>';
  main.innerHTML=`
    <div class="row" style="align-items:flex-start">
      <div class="grow"><h2>${esc(m.title)}</h2><p class="sub">${m.year||"—"} · ${esc(m.kind||"movie")} ${m.original_title?" · "+esc(m.original_title):""}</p></div>
      <button class="sm" id="anBtn">✨ AI 分析</button>
      <button class="ghost sm" id="simBtn">相似片</button>
      <button class="danger sm" id="delBtn">删除</button>
    </div>
    <div class="card"><div class="hd">剧情简介</div><div class="bd" id="summaryBox">${m.summary?esc(m.summary):'<span class="muted">暂无。上传字幕后点「AI 分析」自动生成。</span>'}</div></div>
    <div class="card"><div class="hd">演职人员</div><div class="bd">${castRows}</div></div>
    <div class="card"><div class="hd">人物 <span class="muted" style="font-weight:400" id="faceCount"></span><span class="grow"></span><button class="ghost sm hidden" id="mergeBtn">合并选中</button></div><div class="bd"><div class="facewall" id="faceWall"><span class="muted">加载中…</span></div></div></div>
    <div class="card"><div class="hd">标签</div><div class="bd">${tagChips}</div></div>
    <div class="card"><div class="hd">剧情时间轴 <span class="muted" style="font-weight:400">· ${timeline.length} 节点</span></div><div class="bd">${tlRows}</div></div>
    <div class="card"><div class="hd">字幕 <span class="grow"></span><button class="ghost sm" id="upSubBtn">上传字幕</button></div><div class="bd" id="subBox">${subs.length?subs.map(s=>`<div class="row" style="justify-content:space-between"><span>${esc(s.lang)} · ${esc(s.format)}</span><button class="ghost sm" data-sub="${s.id}">查看台词</button></div>`).join(""):'<span class="muted">暂无字幕</span>'}</div></div>
    <div class="card"><div class="hd">截图 <span class="muted" style="font-weight:400">· ${shots.length}</span></div><div class="bd"><div class="shots" id="shotBox">${shots.length?'':'<span class="muted">暂无截图</span>'}</div></div></div>
    <div class="card hidden" id="simCard"><div class="hd">相似影片</div><div class="bd" id="simBox"></div></div>
    <div class="card hidden" id="jobCard"><div class="hd">分析进度</div><div class="bd" id="jobBox"></div></div>
  `;
  $("#anBtn").onclick=()=>openAnalyze(m.id);
  $("#simBtn").onclick=()=>loadSimilar(m.id);
  $("#delBtn").onclick=()=>delMovie(m.id);
  $("#upSubBtn").onclick=()=>uploadSub(m.id);
  $("#mergeBtn").onclick=mergeSelectedClusters;
  main.querySelectorAll("[data-sub]").forEach(b=>b.onclick=()=>viewSegments(b.dataset.sub));
  loadFaceClusters(m.id);
  // screenshots: lazy-resolve signed URLs only when a thumb scrolls into view
  // (a feature film has 1000s of frames — eager fetch melts the browser), and
  // click any thumb to open the lightbox.
  currentShots=shots; currentSubs=subs; lbSegments=null; lbSegPromise=null;
  const sb=$("#shotBox");
  if(thumbIO)thumbIO.disconnect();
  thumbIO=new IntersectionObserver(es=>{es.forEach(e=>{if(!e.isIntersecting)return;const img=e.target;thumbIO.unobserve(img);
    resolveShotUrl(img.dataset.scId).then(u=>{img.src=u;}).catch(()=>shotUrlCache.delete(img.dataset.scId));});},{rootMargin:"400px"});
  currentShots.forEach((s,i)=>{
    const img=document.createElement("img");img.alt="frame";img.dataset.scId=s.id;
    img.title=ms2hms(s.ts_ms);img.onclick=()=>openLightbox(i);
    sb.append(img);thumbIO.observe(img);
  });
}

// loadImg caches decoded keyframes (one keyframe holds many faces).
function loadImg(url){
  if(imgCache.has(url))return imgCache.get(url);
  const p=new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=url;});
  imgCache.set(url,p);return p;
}
// faceThumb crops a face box out of its keyframe into a <canvas> (display-only;
// cross-origin taint is fine since we never read it back).
async function faceThumb(scId,box,size){
  const cv=document.createElement("canvas");cv.width=size;cv.height=size;
  const ctx=cv.getContext("2d");ctx.fillStyle="#1e222b";ctx.fillRect(0,0,size,size);
  try{
    const img=await loadImg(await resolveShotUrl(scId));
    const sx=Math.max(0,box.x*img.naturalWidth),sy=Math.max(0,box.y*img.naturalHeight);
    const sw=Math.max(1,box.w*img.naturalWidth),sh=Math.max(1,box.h*img.naturalHeight);
    ctx.drawImage(img,sx,sy,sw,sh,0,0,size,size);
  }catch{}
  return cv;
}
async function loadFaceClusters(mediaID){
  currentMovieID=mediaID;selClusters.clear();updateMergeBtn();
  const wall=$("#faceWall");
  try{
    const r=await api(`/api/film/movies/${mediaID}/face-clusters`);
    faceClusters=r.clusters||[];
    $("#faceCount").textContent=faceClusters.length?("· "+faceClusters.length+" 组"):"";
    if(!faceClusters.length){wall.innerHTML='<span class="muted">暂无人脸(filmscan push 时带 faces.json)</span>';return;}
    wall.innerHTML="";
    faceClusters.forEach(c=>{
      const card=document.createElement("div");card.className="facecard";card.dataset.cid=c.id;
      card.innerHTML=`<div class="facethumb" data-thumb></div><div class="facename">${esc(c.person_name||c.label||"未命名")}</div><div class="facemeta">${c.face_count} 张</div>`;
      if(c.rep_screenshot_id)faceThumb(c.rep_screenshot_id,c.rep_box,84).then(cv=>{const t=card.querySelector("[data-thumb]");t.innerHTML="";t.append(cv);});
      card.onclick=(e)=>{ if(e.metaKey||e.ctrlKey||e.shiftKey)toggleCluster(c.id,card); else openCluster(c.id); };
      wall.append(card);
    });
  }catch(e){wall.innerHTML=`<span class="muted">${esc(e.message)}</span>`;}
}
function toggleCluster(cid,card){ selClusters.has(cid)?(selClusters.delete(cid),card.classList.remove("sel")):(selClusters.add(cid),card.classList.add("sel")); updateMergeBtn(); }
function updateMergeBtn(){ const b=$("#mergeBtn"); if(!b)return; b.classList.toggle("hidden",selClusters.size<2); b.textContent=`合并选中 (${selClusters.size})`; }
async function mergeSelectedClusters(){
  const ids=[...selClusters]; if(ids.length<2)return;
  try{ await api(`/api/film/movies/${currentMovieID}/face-clusters/${ids[0]}/merge`,{method:"POST",body:{from:ids.slice(1)}}); toast("已合并","ok"); loadFaceClusters(currentMovieID); }
  catch(e){toast(e.message,"err");}
}
async function openCluster(cid){
  panelCid=cid;selFaces.clear();$("#faceSelN").textContent="0";
  const c=faceClusters.find(x=>x.id===cid);
  $("#faceDlgTitle").textContent=(c&&(c.person_name||c.label))||"人物";
  const grid=$("#faceDlgGrid");grid.innerHTML='<span class="muted">加载中…</span>';
  $("#faceDlg").showModal();
  try{
    const r=await api(`/api/film/face-clusters/${cid}/faces`);const faces=r.faces||[];
    grid.innerHTML=faces.length?"":'<span class="muted">空</span>';
    faces.forEach(f=>{
      const cell=document.createElement("div");cell.className="facecell";cell.dataset.fid=f.id;
      faceThumb(f.screenshot_id,f.box,72).then(cv=>cell.append(cv));
      cell.onclick=()=>{ selFaces.has(f.id)?(selFaces.delete(f.id),cell.classList.remove("sel")):(selFaces.add(f.id),cell.classList.add("sel")); $("#faceSelN").textContent=selFaces.size; };
      grid.append(cell);
    });
  }catch(e){grid.innerHTML=esc(e.message);}
}
async function faceOp(path,body,okMsg){
  try{ await api(path,{method:"POST",body}); toast(okMsg,"ok"); $("#faceDlg").close(); loadFaceClusters(currentMovieID); }
  catch(e){toast(e.message,"err");}
}

async function loadSimilar(id){
  const card=$("#simCard"),box=$("#simBox");card.classList.remove("hidden");box.innerHTML='加载中…';
  try{const r=await api(`/api/film/movies/${id}/similar?limit=8`);const s=r.similar||[];
    box.innerHTML=s.length?s.map(x=>`<div class="row" style="justify-content:space-between;cursor:pointer" onclick="openMovie('${x.media_id}')"><span>${esc(x.title)}</span><span class="score">${(x.score*100).toFixed(0)}%</span></div>`).join(""):'<span class="muted">暂无(需先建立电影级向量,试试「重建索引」)</span>';
  }catch(e){box.innerHTML=`<span class="muted">${esc(e.message)}</span>`;}
}

async function viewSegments(subId){
  try{const r=await api(`/api/film/subtitles/${subId}/segments`);const segs=r.segments||[];
    const box=$("#subBox");
    box.innerHTML=segs.map(s=>{
      const spk=s.speaker?`<b style="color:var(--accent)">${esc(s.speaker)}</b> `:"";
      const jump=currentShots.length?` jump" data-ts="${s.start_ms}` : "";
      return `<div class="seg"><span class="ts${jump}" title="${currentShots.length?'跳到对应画面':''}">${ms2t(s.start_ms)} → ${ms2t(s.end_ms)}</span><span>${spk}${esc(s.text)}</span></div>`;
    }).join("")||'<span class="muted">空</span>';
    box.querySelectorAll(".ts[data-ts]").forEach(el=>el.onclick=()=>{const i=nearestShotIndex(parseInt(el.dataset.ts));if(i>=0)openLightbox(i);else toast("暂无对应截图","");});
  }catch(e){toast(e.message,"err");}
}

async function uploadSub(id){
  const inp=document.createElement("input");inp.type="file";inp.accept=".srt,.vtt";
  inp.onchange=async()=>{const f=inp.files[0];if(!f)return;const content=await f.text();
    const fmt=f.name.toLowerCase().endsWith(".vtt")?"vtt":"srt";
    try{const r=await api(`/api/film/movies/${id}/subtitles`,{method:"POST",body:{lang:"zh-CN",format:fmt,content}});
      toast(`已解析 ${r.segments} 段,嵌入 ${r.embedded}`,"ok");openMovie(id);
    }catch(e){toast(e.message,"err");}
  };inp.click();
}

async function delMovie(id){
  if(!confirm("删除该影片及其字幕/截图/向量?"))return;
  try{await api(`/api/film/movies/${id}`,{method:"DELETE"});toast("已删除","ok");state.sel=null;
    $("#main").innerHTML='<div class="empty">选择左侧影片。</div>';loadMovies();
  }catch(e){toast(e.message,"err");}
}

function openAnalyze(id){
  const sel=$("#aCfg");sel.innerHTML="";
  if(state.llmConfigs.length){state.llmConfigs.forEach(c=>{const o=document.createElement("option");o.value=c.id;o.textContent=(c.name||c.model)+" ("+(c.model||"")+")";sel.append(o);});
    const last=localStorage.getItem(CFG_KEY);if(last)sel.value=last;}
  else{const o=document.createElement("option");o.value="";o.textContent="（无可用配置 — 去 dock 配置 LLM）";sel.append(o);}
  $("#aRun").onclick=()=>runAnalyze(id);
  $("#analyzeDlg").showModal();
}

async function runAnalyze(id){
  const cfg=parseInt($("#aCfg").value);if(!cfg){toast("请选择 LLM 配置","err");return;}
  localStorage.setItem(CFG_KEY,String(cfg));
  const steps=[...document.querySelectorAll(".aStep:checked")].map(c=>c.value);
  try{
    const job=await api(`/api/film/movies/${id}/analyze`,{method:"POST",body:{llm_config_id:cfg,steps}});
    $("#analyzeDlg").close();
    $("#jobCard").classList.remove("hidden");
    toast("分析已开始…","ok");pollJob(id,job.id);
  }catch(e){toast(e.message,"err");}
}

async function pollJob(mediaId,jobId){
  const box=$("#jobBox");
  for(let i=0;i<60;i++){
    let j;try{j=await api(`/api/film/analyze/${jobId}`);}catch(e){box.innerHTML=esc(e.message);return;}
    const steps=j.steps||{};
    box.innerHTML=Object.entries(steps).map(([k,v])=>{
      const cls=v.status==="done"?"ok":v.status==="failed"?"fail":v.status==="running"?"run":"";
      return `<span class="chip ${cls}">${k}: ${v.status}${v.count?" ("+v.count+")":""}</span>`;
    }).join("")+`<div class="muted" style="margin-top:8px">任务 ${esc(j.status)}</div>`;
    if(j.status==="done"||j.status==="failed"){
      if(j.status==="done")toast("分析完成","ok");else toast("分析失败(部分步骤)","err");
      openMovie(mediaId);return;
    }
    await new Promise(r=>setTimeout(r,3000));
  }
}
boot();
</script>
